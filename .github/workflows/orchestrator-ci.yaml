name: Orchestrator CI

on:
  push:
    branches: [main]
    paths:
      - "orchestrator/**"
      - "proto/**"
  pull_request:
    paths:
      - "orchestrator/**"
      - "proto/**"

defaults:
  run:
    working-directory: orchestrator

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Generate proto stubs
        run: |
          mkdir -p generated
          uv run python -m grpc_tools.protoc \
            --proto_path=../proto \
            --python_out=generated \
            --pyi_out=generated \
            --grpc_python_out=generated \
            ../proto/*.proto
          for f in generated/*_pb2*.py; do
            sed -i 's/^import \([a-z_]*_pb2\)/from . import \1/' "$f"
          done
          touch generated/__init__.py

      - name: Lint
        run: uv run ruff check src && uv run ruff format --check src

      - name: Typecheck
        run: uv run pyright src

      - name: Tests
        run: uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate proto stubs
        run: docker compose run --rm proto-gen

      - name: Build images
        run: docker compose build

      - name: Bring orchestrator stack up
        run: docker compose up -d --wait orchestrator

      - name: Verify orchestrator and dependencies are running
        run: |
          docker compose ps
          docker compose ps db --format '{{.State}}' | grep -q running
          docker compose ps qdrant --format '{{.State}}' | grep -q running
          docker compose ps orchestrator --format '{{.State}}' | grep -q running
          docker compose logs orchestrator | grep -q "Database connection verified"
          docker compose logs orchestrator | grep -q "Qdrant connection verified"
          docker compose logs orchestrator | grep -q "gRPC server starting on port"

      - name: Tear down
        if: always()
        run: docker compose down -v
