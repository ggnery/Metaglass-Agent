syntax = "proto3";

package metaglass;

import "common.proto";

// ══════════════════════════════════════════════════════════════
//  ORCHESTRATOR — Query channel between Middleware and Orchestrator
// ══════════════════════════════════════════════════════════════
service Orchestrator {

  // Unary request-response — for complete, one-shot queries
  // (e.g. typed text, single image captured by the glasses).
  rpc Query(QueryRequest) returns (QueryResponse);

  // Server-side streaming — client sends a complete query and receives
  // the response in chunks (useful when input is short but output is long,
  // e.g. "explain this contract" -> long response with TTS).
  rpc QueryStream(QueryRequest) returns (stream QueryResponse);

  // Bidirectional streaming — middleware sends real-time chunks
  // (audio frames, video frames) and the orchestrator streams
  // back partial responses as they become available.
  rpc StreamQuery(stream QueryRequest) returns (stream QueryResponse);
}

// ── Input ──────────────────────────────────────────────────────────
message QueryRequest {
  string session_id = 1;

  // Multimodal input — may contain multiple simultaneous payloads
  // (e.g. user audio + frame of what they are seeing)
  repeated MediaPayload inputs = 2;

  // text input (e.g. typed query)
  string text_query = 3;

  // Streaming control
  StreamControl stream_control = 4;
}

// ── Output ─────────────────────────────────────────────────────────
message QueryResponse {
  Status status = 1;

  // Which agent processed this response
  string resolved_agent = 2;          // e.g. "legal_assistant"

  // Text response (partial or complete)
  string text_response = 3;

  // Audio response (TTS chunks)
  MediaPayload audio_response = 4;

  // Response streaming control
  StreamControl stream_control = 5;
}
