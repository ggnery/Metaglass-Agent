syntax = "proto3";

package metaglass;

// ── Standardized status ────────────────────────────────────────────
enum StatusCode {
  STATUS_CODE_UNSPECIFIED = 0;
  STATUS_CODE_OK = 1;
  STATUS_CODE_ERROR = 2;
  STATUS_CODE_PARTIAL = 3;            // response still in progress
  STATUS_CODE_RATE_LIMITED = 4;
  STATUS_CODE_AGENT_UNAVAILABLE = 5;
}

message Status {
  StatusCode code = 1;
  string message = 2;
}

// ── Media modality ─────────────────────────────────────────────────
enum Modality {
  MODALITY_UNSPECIFIED = 0;
  MODALITY_AUDIO = 1;
  MODALITY_IMAGE = 2;
  MODALITY_VIDEO = 3;
  MODALITY_TEXT = 4;
}

// ── Generic multimodal payload ─────────────────────────────────────
message MediaPayload {
  Modality modality = 1;
  bytes data = 2;                     // raw bytes (opus audio, jpeg frame, etc.)
  string mime_type = 3;               // "audio/opus", "image/jpeg", "video/h264"

  // Free-form modality-specific attributes:
  //   audio: {"sample_rate": "48000", "duration_ms": "1500", "channels": "2"}
  //   image: {"width": "1920", "height": "1080"}
  //   video: {"width": "1920", "height": "1080", "fps": "30", "duration_ms": "5000"}
  map<string, string> metadata = 4;
}

// ── Streaming control ──────────────────────────────────────────────
message StreamControl {
  bool is_final_chunk = 1;            // true = last chunk in the stream
  int32 sequence_number = 2;          // for reordering on the orchestrator side
  string stream_id = 3;              // groups chunks belonging to the same stream
}

// ── Session state ──────────────────────────────────────────────────
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_ACTIVE = 1;
  SESSION_STATE_LOST = 2;
  SESSION_STATE_CLOSED = 3;
}
