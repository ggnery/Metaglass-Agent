syntax = "proto3";

package metaglass;

import "common.proto";

// ══════════════════════════════════════════════════════════════
//  CONTEXT — Datalake interface
// ══════════════════════════════════════════════════════════════
//  Allows middleware (or other clients) to query and inject
//  context directly into the datalake.
service Context {

  // Semantic search on Qdrant — pre-loads relevant memories/documents
  rpc SemanticSearch(SemanticSearchRequest) returns (SemanticSearchResponse);

  // Persists a new context fragment (e.g. "user just entered
  // the supermarket" detected via GPS on the middleware)
  rpc PushContext(PushContextRequest) returns (PushContextResponse);

  // Returns the immediate session context (stored in Postgres)
  rpc GetSessionContext(GetSessionContextRequest) returns (GetSessionContextResponse);
}

// ── SemanticSearch ─────────────────────────────────────────────────
message SemanticSearchRequest {
  string user_id = 1;
  string query_text = 2;              // text for similarity search
  int32 top_k = 3;                    // number of results to return
  float score_threshold = 4;          // minimum similarity score (0.0 - 1.0)
  repeated string collections = 5;    // target Qdrant collections: "documents", "history", ...
  map<string, string> filters = 6;    // additional metadata filters
}

message SemanticSearchResponse {
  Status status = 1;
  repeated SemanticResult results = 2;
}

message SemanticResult {
  string id = 1;
  string collection = 2;
  float score = 3;
  string content = 4;                 // fragment text
  map<string, string> metadata = 5;   // source, date, type, etc.
}

// ── PushContext ─────────────────────────────────────────────────────
message PushContextRequest {
  string session_id = 1;
  ContextEntry entry = 2;
}

message PushContextResponse {
  Status status = 1;
  string context_id = 2;
}

// ── GetSessionContext ──────────────────────────────────────────────
message GetSessionContextRequest {
  string session_id = 1;
  int32 max_entries = 2;              // last N session contexts
}

message GetSessionContextResponse {
  Status status = 1;
  repeated ContextEntry entries = 2;
}

// ── Helper types ───────────────────────────────────────────────────
message ContextEntry {
  string context_type = 1;            // "location", "calendar_event", "visual_scene", "user_action"
  string content = 2;                 // textual context content
  map<string, string> metadata = 3;
  int32 ttl = 4;                      // context TTL in seconds
}
