x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

x-qdrant-env: &qdrant-env
  QDRANT_HOST: ${QDRANT_HOST:-qdrant}
  QDRANT_PORT: ${QDRANT_PORT:-6333}
  QDRANT_GRPC_PORT: ${QDRANT_GRPC_PORT:-6334}

services:
  db:
    image: postgres:14.22-trixie
    environment:
      <<: *postgres-env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrations:
    build: .
    command: alembic upgrade head
    environment:
      <<: *postgres-env
    depends_on:
      db:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.17.1
    environment:
      <<: *qdrant-env
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  proto-gen:
    build: .
    entrypoint: ["sh", "-c"]
    command:
      - |
        python -m grpc_tools.protoc \
          --proto_path=/app/proto \
          --python_out=/app/generated \
          --pyi_out=/app/generated \
          --grpc_python_out=/app/generated \
          /app/proto/*.proto &&
        for f in /app/generated/*_pb2*.py; do
          sed -i 's/^import \([a-z_]*_pb2\)/from . import \1/' "$$f";
        done &&
        touch /app/generated/__init__.py &&
        echo "Proto compilation complete"
    volumes:
      - ../proto:/app/proto:ro
      - ./generated:/app/generated

  orchestrator:
    build: .
    command: python src/main.py
    ports:
      - "${GRPC_PORT:-50051}:50051"
    environment:
      <<: [*postgres-env, *qdrant-env]
      GRPC_PORT: ${GRPC_PORT:-50051}
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  postgres_data:
  qdrant_data: